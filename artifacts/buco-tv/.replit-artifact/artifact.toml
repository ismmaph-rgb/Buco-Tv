kind = "web"
previewPath = "/"
title = "BUCO TV"
version = "1.0.0"
id = "artifacts/buco-tv"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23663

[services.development]
run = "pnpm --filter @workspace/buco-tv run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buco-tv", "run", "build" ]
publicDir = "artifacts/buco-tv/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23663"
BASE_PATH = "/"
